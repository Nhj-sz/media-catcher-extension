<svg xmlns="http://www.w3.org/2000/svg" width="720" height="444" viewBox="0 0 720 444" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <!-- page background -->
  <rect width="720" height="444" fill="#f0f2f5"/>
  <!-- browser top bar -->
  <rect x="0" y="0" width="720" height="34" fill="#e3e6ea"/>
  <circle cx="18" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="17" r="6" fill="#febc2e"/>
  <circle cx="58" cy="17" r="6" fill="#28c840"/>
  <rect x="90" y="8" width="600" height="18" rx="9" fill="#ffffff"/>
  <text x="104" y="21" font-size="11" fill="#8a9099">https://example.com/video</text>

  <!-- page content: video with V1 badge -->
  <rect x="24" y="56" width="372" height="200" rx="8" fill="#1f2328"/>
  <text x="210" y="150" font-size="13" fill="#ffffff" text-anchor="middle" opacity="0.7">视频播放器</text>
  <rect x="32" y="64" width="30" height="22" rx="5" fill="#2563eb"/>
  <text x="47" y="79" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">V1</text>
  <rect x="24" y="270" width="300" height="10" rx="5" fill="#d6dae0"/>
  <rect x="24" y="290" width="340" height="10" rx="5" fill="#d6dae0"/>
  <rect x="24" y="310" width="260" height="10" rx="5" fill="#d6dae0"/>

  <!-- floating panel -->
  <rect x="420" y="56" width="282" height="356" rx="10" fill="#ffffff" stroke="#d0d7de"/>
  <rect x="420" y="56" width="282" height="38" rx="10" fill="#f6f8fa"/>
  <rect x="420" y="84" width="282" height="10" fill="#f6f8fa"/>
  <text x="434" y="80" font-size="14" font-weight="700" fill="#1f2328">抓媒酱</text>
  <text x="500" y="80" font-size="10" fill="#656d76">已捕获 1 个媒体</text>
  <text x="688" y="80" font-size="16" text-anchor="middle" fill="#656d76">×</text>
  <!-- filter row -->
  <rect x="434" y="102" width="118" height="22" rx="6" fill="#ffffff" stroke="#d0d7de"/>
  <text x="442" y="117" font-size="10" fill="#8a9099">搜索…</text>
  <rect x="560" y="102" width="42" height="22" rx="6" fill="#ddf4ff" stroke="#54aeff"/>
  <text x="581" y="117" font-size="10" text-anchor="middle" fill="#0969da">全部</text>
  <rect x="666" y="102" width="24" height="22" rx="6" fill="#ffffff" stroke="#d0d7de"/>
  <text x="678" y="118" font-size="12" text-anchor="middle" fill="#656d76">↻</text>
  <!-- item card -->
  <rect x="434" y="134" width="252" height="122" rx="8" fill="#ffffff" stroke="#e1e4e8"/>
  <rect x="442" y="142" width="26" height="20" rx="5" fill="#2563eb"/>
  <text x="455" y="156" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">V1</text>
  <text x="476" y="157" font-size="12" font-weight="600" fill="#1f2328">示例视频标题</text>
  <rect x="442" y="166" width="34" height="16" rx="8" fill="#ddf4ff"/>
  <text x="459" y="178" font-size="9" text-anchor="middle" fill="#0969da">视频</text>
  <rect x="482" y="166" width="62" height="16" rx="8" fill="#eaf6ec"/>
  <text x="513" y="178" font-size="9" text-anchor="middle" fill="#1a7f37">已匹配直链</text>
  <text x="442" y="196" font-size="10" fill="#656d76">02:05 · 12.4 MB · 1280×720</text>
  <rect x="442" y="208" width="50" height="22" rx="6" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="467" y="223" font-size="10" text-anchor="middle" fill="#1f2328">定位</text>
  <rect x="498" y="208" width="50" height="22" rx="6" fill="#1f883d"/>
  <text x="523" y="223" font-size="10" text-anchor="middle" fill="#ffffff">下载</text>
  <rect x="554" y="208" width="50" height="22" rx="6" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="579" y="223" font-size="10" text-anchor="middle" fill="#1f2328">复制</text>
  <rect x="610" y="208" width="56" height="22" rx="6" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="638" y="223" font-size="9" text-anchor="middle" fill="#1f2328">录制</text>
  <!-- footer -->
  <rect x="434" y="368" width="252" height="32" rx="8" fill="#f6f8fa"/>
  <text x="450" y="388" font-size="10" fill="#1f2328">批量下载</text>
  <text x="528" y="388" font-size="10" fill="#1f2328">导出</text>
  <text x="612" y="388" font-size="10" fill="#1f2328">清空</text>

  <!-- floating toggle button -->
  <rect x="596" y="416" width="108" height="24" rx="12" fill="#2563eb"/>
  <text x="650" y="432" font-size="11" fill="#ffffff" text-anchor="middle">视频面板 · Alt+V</text>
</svg>
