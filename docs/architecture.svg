<svg xmlns="http://www.w3.org/2000/svg" width="700" height="220" viewBox="0 0 700 220" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="700" height="220" fill="#f7f9fb"/>
  <!-- web page -->
  <rect x="20" y="70" width="120" height="80" rx="10" fill="#ffffff" stroke="#d0d7de"/>
  <text x="80" y="100" font-size="12" font-weight="700" text-anchor="middle" fill="#1f2328">网页</text>
  <text x="80" y="120" font-size="10" text-anchor="middle" fill="#656d76">video/audio/img</text>
  <text x="80" y="136" font-size="10" text-anchor="middle" fill="#656d76">+ 网络请求</text>
  <!-- content script -->
  <rect x="190" y="36" width="150" height="80" rx="10" fill="#eef4ff" stroke="#54aeff"/>
  <text x="265" y="66" font-size="12" font-weight="700" text-anchor="middle" fill="#0969da">Content Script</text>
  <text x="265" y="84" font-size="10" text-anchor="middle" fill="#0969da">扫描 DOM</text>
  <text x="265" y="100" font-size="10" text-anchor="middle" fill="#0969da">上报媒体</text>
  <!-- webRequest -->
  <rect x="190" y="128" width="150" height="60" rx="10" fill="#eaf6ec" stroke="#57ab5a"/>
  <text x="265" y="156" font-size="12" font-weight="700" text-anchor="middle" fill="#1a7f37">webRequest</text>
  <text x="265" y="174" font-size="10" text-anchor="middle" fill="#1a7f37">捕获网络媒体</text>
  <!-- background -->
  <rect x="390" y="70" width="150" height="80" rx="10" fill="#ffffff" stroke="#d0d7de"/>
  <text x="465" y="98" font-size="12" font-weight="700" text-anchor="middle" fill="#1f2328">Background</text>
  <text x="465" y="116" font-size="10" text-anchor="middle" fill="#656d76">聚合 + 持久化</text>
  <text x="465" y="132" font-size="10" text-anchor="middle" fill="#656d76">storage.session</text>
  <!-- UI: panel -->
  <rect x="588" y="34" width="94" height="62" rx="10" fill="#ffffff" stroke="#d0d7de"/>
  <text x="635" y="60" font-size="11" font-weight="700" text-anchor="middle" fill="#1f2328">悬浮面板</text>
  <text x="635" y="80" font-size="9" text-anchor="middle" fill="#656d76">in-page</text>
  <!-- UI: popup -->
  <rect x="588" y="120" width="94" height="62" rx="10" fill="#ffffff" stroke="#d0d7de"/>
  <text x="635" y="146" font-size="11" font-weight="700" text-anchor="middle" fill="#1f2328">Popup</text>
  <text x="635" y="166" font-size="9" text-anchor="middle" fill="#656d76">扩展图标</text>
  <!-- arrows -->
  <line x1="140" y1="108" x2="186" y2="92" stroke="#8a9099" stroke-width="2"/>
  <line x1="140" y1="120" x2="186" y2="158" stroke="#8a9099" stroke-width="2"/>
  <line x1="340" y1="78" x2="386" y2="100" stroke="#8a9099" stroke-width="2"/>
  <line x1="340" y1="162" x2="386" y2="120" stroke="#8a9099" stroke-width="2"/>
  <line x1="540" y1="100" x2="584" y2="66" stroke="#8a9099" stroke-width="2"/>
  <line x1="540" y1="120" x2="584" y2="152" stroke="#8a9099" stroke-width="2"/>
</svg>
